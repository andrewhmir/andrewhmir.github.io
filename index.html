<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>ValenTIMES Crossword</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* (unchanged CSS omitted for brevity — use your original styles) */
body {
  margin: 0;
  font-family: 'Merriweather', serif; /* change here */
  background: #f5f5f5;
  color: #222;
  text-align: center;
}

.cell input {
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  text-transform: uppercase;
  background: transparent;
  font-variant-numeric: tabular-nums;
  letter-spacing: 1px;
  font-family: 'Merriweather', serif; /* apply to cells */
}

.num {
  font-size: 10px;
  color: #000;
  font-weight: 500;
  font-family: 'Merriweather', serif; /* apply to clue numbers */
}

h1 {
  margin: 18px 0 5px;
  font-weight: 700;
  color: #111;
}

.cell {
  width: 46px;
  height: 46px;
  background: #ffffff; /* hard white */
  border: 1px solid #000; /* subtle grid outline */
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cell input {
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  text-align: center;
  font-size: 22px; /* slightly bigger for NYT feel */
  font-weight: 700;
  text-transform: uppercase;
  background: transparent;
  font-variant-numeric: tabular-nums; /* ensures letters are evenly spaced */
  letter-spacing: 1px;
}

.black {
  background: #000000;
  box-shadow: none;
}

.correct { background: #b0e0e6; } /* subtle NYT blue highlight */
.wrong { background: #f4c2c2; }

.num {
  position: absolute;
  top: 2px;
  left: 4px;
  font-size: 10px;
  color: #000; /* black numbers like NYT */
  font-weight: 500;
}

#clues {
  width: 260px;
  background: #cecece; 
  padding: 15px;
  border-radius: 0;    /* remove rounded corners */
  box-shadow: none;    /* remove shadow */
  text-align: left;
  flex: 0 0 260px;
  order: 1;
}

/* Overlay for yes/no stage */
#choiceOverlay {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
  z-index: 1000;
  display: none; /* initially hidden */
}

.choiceButton {
  padding: 20px 40px;
  font-size: 32px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  color: white;
  transition: transform 0.2s, background 0.2s;
}

.buttonWrapper {
  display: flex;
  gap: 40px;
  margin-top: 200px; /* pushes buttons down */
}

.dimmed {
  opacity: 0.2;
  pointer-events: none; /* optional: prevent clicks on dimmed cells */
  transition: opacity 0.3s;
}

.choiceButton:hover {
  transform: scale(1.1);
}

#yesBtn { background: #b0e0e6; }
#yesBtn2 { background: #f4c2c2; }

#grid {
  display: grid;
  gap: 0px;
  order: 2; /* grid second */
}

#container {
  display: flex;
  justify-content: center;
  align-items: flex-start; /* top-align grid and clues */
  gap: 30px;
  padding: 10px 20px 30px;
  max-width: 100vw; /* prevent horizontal scrolling */
}

#clues h3 b {
  font-weight: 700; /* bold only the title */
}

#clueList .clue {
  font-weight: 400;  /* normal weight for all clue text */
  font-family: 'Merriweather', serif;
  margin-bottom: 6px;
}

footer {
  font-size: 12px;
  opacity: .8;
  margin: 15px auto; /* center the footer */
  text-align: center;
  clear: both;       /* prevent flex issues from affecting it */
}

</style>
</head>
<body>

<h1>ValenTIMES Crossword </h1>

<div id="container">
  <div id="grid"></div>

  <div id="clues">
    <h3><b>Clues</b></h3>
    <div id="clueList"></div>
  </div>
</div> <!-- end of container -->

<!-- YES/NO overlay -->
<div id="choiceOverlay">
  <div class="buttonWrapper">
    <button id="yesBtn" class="choiceButton">YES:0</button>
    <button id="yesBtn2" class="choiceButton">YES:))</button>
  </div>
</div>

<!-- Footer outside everything else -->
<footer>made by yours truly (づ ◕‿◕ )づ aka andrew alangcao
<br>
  side note: if you've noticed this crossword only works downwards hehe. I DID NOT EXPECT  CROSSWWORDS TO BE THAT HARD TO MAKE
</footer>


<script>
/* ---------- puzzle & clues (keep original data) ---------- */
const puzzle = {
  width: 13,
  height: 12,
  columns: [
    ["black","black","black","black","answer","answer","answer","answer","black","black","black","black"],
    ["black","black","black","black","answer","answer","answer","answer","answer","answer","answer","answer"],
    ["black","black","black","black","black","answer","answer","answer","black","black","black","black"],
    ["black","black","black","black","answer","answer","answer","black","black","black","black","black"],
    ["black","black","black","black","black","answer","answer","answer","answer","answer","answer","black"],
    ["black","black","black","black","answer","answer","answer","answer","answer","answer","black","black"],
    ["black","black","black","answer","answer","answer","answer","answer","answer","black","black","black"],
    ["answer","answer","answer","answer","answer","answer","answer","black","black","black","black","black"],
    ["black","answer","answer","answer","answer","answer","answer","answer","answer","answer","black","black"],
    ["black","black","black","black","black","answer","answer","answer","answer","answer","answer","answer"],
    ["black","black","black","answer","answer","answer","answer","answer","answer","answer","black","black"],
    ["black","answer","answer","answer","answer","answer","answer","black","black","black","black","black"],
    ["black","black","black","black","black","answer","answer","answer","black","black","black","black"]
  ],
  solution:{
"4_0":"S","5_0":"B","6_0":"C","7_0":"A","5_1":"E","5_2":"M","5_3":"Y","5_4":"V","5_5":"A","5_6":"L","5_7":"E","5_8":"N","5_9":"T","5_10":"I","5_11":"N","5_12":"E","4_1":"R","6_1":"P","7_1":"O","8_1":"R","9_1":"T","10_1":"E","11_1":"R","11_9":"I","10_9":"R","9_9":"I","8_9":"J","7_9":"U","6_9":"S","1_11":"B","2_11":"Y","3_11":"L","4_11":"I","6_11":"E","6_12":"I","7_12":"C","3_10":"N","4_10":"A","6_10":"L","7_10":"O","8_10":"N","9_10":"G","0_7":"O","1_7":"C","2_7":"T","3_7":"O","4_7":"B","6_7":"R","1_8":"C","2_8":"H","3_8":"R","4_8":"O","6_8":"I","7_8":"C","8_8":"L","9_8":"E","6_2":"A","7_2":"Y","4_3":"N","6_3":"C","6_4":"A","7_4":"L","8_4":"L","9_4":"E","10_4":"Y","4_5":"M","6_5":"T","7_5":"C","8_5":"H","9_5":"A","3_6":"C","4_6":"O","6_6":"U","7_6":"M","8_6":"N"
}
};  

const clues = {
  1: "Home for 12 years! (Abbreviated)",
  2: "dream and future job",
  3: "birthmonth",
  4: "our first comp together (Abbreviated)",
  5: "lily of the ______; your fav flower!",
  6: "2nd fav drink next to coffee; m?",
  7: "a section where a WRITER expresses personal opinions, analysis, and insights on specific topics; c______",
  8: "confession month",
  9: "priorities; bedan _______",
  10: "confession spot:)",
  11: "yellow dragon!",
  12: "what follows a headline? -sir esteban",
  13: "position in 9 (Abbreviated)",
};

/* ---------- grid setup & state ---------- */
const grid = document.getElementById("grid");
grid.style.gridTemplateColumns = `repeat(${puzzle.width},46px)`;

const state = Array.from({length: puzzle.height}, () => Array(puzzle.width).fill(""));

/* ---------- helpers (keep function names) ---------- */
function key(r,c){ return r + "_" + c; }
function isBlack(r,c){ return puzzle.columns[c][r] === "black"; }

/* small helper to focus a cell safely; used by arrow keys */
function focusCell(r,c){
  if(r < 0 || c < 0 || r >= puzzle.height || c >= puzzle.width) return;
  const idx = r * puzzle.width + c;
  const cell = grid.children[idx];
  if(!cell) return;
  const input = cell.querySelector("input");
  if(input) input.focus();
}

// Call this once row 5 is highlighted
function showYesNoStage() {
  const overlay = document.getElementById("choiceOverlay");
  overlay.style.display = "flex";

  for (let r = 0; r < puzzle.height; r++) {
    for (let c = 0; c < puzzle.width; c++) {
      const cell = grid.children[r * puzzle.width + c];
      if (r !== 5) {
        cell.classList.add("dimmed"); // dim all rows except row 5
      } else {
        cell.classList.remove("dimmed"); // keep row 5 bright
      }
    }
  }

  // Dim clues if you want
  document.getElementById("clues").classList.add("dimmed");

  // Focus buttons
  document.getElementById("yesBtn").focus();
}


// Button handlers
document.getElementById("yesBtn").addEventListener("click", () => {
  hideOverlay();
});

document.getElementById("yesBtn2").addEventListener("click", () => {
  hideOverlay();
});

function hideOverlay() {
  const overlay = document.getElementById("choiceOverlay");
  overlay.style.display = "none";

  // Remove dimming
  for (let r = 0; r < puzzle.height; r++) {
    for (let c = 0; c < puzzle.width; c++) {
      grid.children[r * puzzle.width + c].classList.remove("dimmed");
    }
  }
  document.getElementById("clues").classList.remove("dimmed");
}


/* ---------- makeCell (preserves name and creates input handlers) ---------- */
function makeCell(r,c){
  const d = document.createElement("div");
  d.className = "cell";

  if(isBlack(r,c)){ 
    d.classList.add("black"); 
    return d; 
  }

  const input = document.createElement("input");
  input.maxLength = 1;
  // store coordinates on DOM element for use in events if needed
  input.dataset.r = r;
  input.dataset.c = c;

  // per-input backspace flag (preserves original pattern)
  let backspacePressed = false;

  // KEYDOWN handling (arrow navigation + backspace behavior)
  input.addEventListener("keydown", e => {
    if (e.key === "ArrowDown") { focusCell(r+1, c); e.preventDefault(); }
    else if (e.key === "ArrowUp") { focusCell(r-1, c); e.preventDefault(); }
    else if (e.key === "ArrowLeft") { focusCell(r, c-1); e.preventDefault(); }
    else if (e.key === "ArrowRight") { focusCell(r, c+1); e.preventDefault(); }

    if (e.key === "Backspace") {
      backspacePressed = true;
      if (input.value) {
        // delete content in this cell
        // allow default deletion, but also update state and classes
        // (we handle class/state in input event)
      } else {
        // move up (preserves your original moveUp behavior)
        e.preventDefault();
        moveUp(r, c);
      }
    }
  });

  // INPUT handling (sanitize, update state, mark correct/wrong, move focus)
  input.addEventListener("input", e => {
    let v = input.value.toUpperCase().replace(/[^A-Z]/g,"");
    input.value = v;
    state[r][c] = v;

    const sol = puzzle.solution[key(r,c)];
    if(v){
      if(sol && v===sol) d.classList.add("correct"), d.classList.remove("wrong");
      else d.classList.add("wrong"), d.classList.remove("correct");
    } else d.classList.remove("correct","wrong");

    // check full puzzle and highlight row 5 if complete
    checkPuzzleComplete();
    // Only move to next cell if not caused by backspace
    if (!backspacePressed) focusNext(r,c);
    backspacePressed = false;
  });


  d.appendChild(input);
  return d;
}

/* ---------- Build Grid (must run after makeCell is defined) ---------- */
for(let r=0;r<puzzle.height;r++){
  for(let c=0;c<puzzle.width;c++){
    grid.appendChild(makeCell(r,c));
  }
}

/* ---------- Numbering & Clues (now safe: grid exists and clues defined) ---------- */
let clueNum = 1;
const clueList = document.getElementById("clueList");

for (let c = 0; c < puzzle.width; c++) {
  for (let r = 0; r < puzzle.height; r++) {
    if (!isBlack(r, c)) {
      const idx = r * puzzle.width + c;

      // Add number to the cell
      const num = document.createElement("div");
      num.className = "num";
      num.textContent = clueNum;
      grid.children[idx].appendChild(num);

      // Add hardcoded clue text instead of input
      const clueDiv = document.createElement("div");
      clueDiv.className = "clue";
      clueDiv.innerHTML = `<b>${clueNum}.</b> ${clues[clueNum] || ""}`;
      clueList.appendChild(clueDiv);

      clueNum++;
      break; // only first cell in column gets number
    }
  }
}

/* ---------- keep the rest of your functions (names retained) ---------- */

function isColumnComplete(col) {
  for (let r = 0; r < puzzle.height; r++) {
    if (!isBlack(r, col)) {
      const val = state[r][col];
      const sol = puzzle.solution[key(r, col)];
      if (val !== sol) return false;
    }
  }
  return true; // all non-black cells are correct
}

function focusNext(r, c) {
  let nextRow = r + 1;
  let nextCol = c;

  // Move down in current column
  while(nextRow < puzzle.height && isBlack(nextRow, nextCol)) nextRow++;

  // If reached bottom or column complete, go to next column
  if(nextRow >= puzzle.height || isColumnComplete(nextCol)){
    nextCol++;  // next column
    while(nextCol < puzzle.width) {
      // skip columns that are fully completed or fully black
      if(isColumnComplete(nextCol)){
        nextCol++;
        continue;
      }

      // find first non-black cell in this column
      let topRow = 0;
      while(topRow < puzzle.height && isBlack(topRow, nextCol)) topRow++;

      if(topRow < puzzle.height){
        nextRow = topRow;
        break; // found a valid column
      }

      nextCol++;
    }
  }

  // Focus if valid
  if(nextCol < puzzle.width && nextRow < puzzle.height){
    grid.children[nextRow*puzzle.width+nextCol].querySelector("input").focus();
  }
}

function moveUp(r, c) {
  let prevRow = r - 1;
  let prevCol = c;

  // Move up in current column, skipping black cells
  while(prevRow >= 0 && isBlack(prevRow, prevCol)) prevRow--;

  // If reached top or column is complete, move to previous column
  if(prevRow < 0 || isColumnComplete(prevCol)){
    prevCol--; // move left
    while(prevCol >= 0){
      // skip completed columns
      if(isColumnComplete(prevCol)){
        prevCol--;
        continue;
      }

      // find bottommost non-black cell in this column
      let bottomRow = puzzle.height - 1;
      while(bottomRow >= 0 && isBlack(bottomRow, prevCol)) bottomRow--;

      if(bottomRow >= 0){
        prevRow = bottomRow;
        break; // found a valid column
      }

      prevCol--;
    }
  }

  // Focus if valid
  if(prevCol >= 0 && prevRow >= 0){
    grid.children[prevRow*puzzle.width + prevCol].querySelector("input").focus();
  }
}

/* ---------- full puzzle check (keeps your function) ---------- */
function checkPuzzleComplete() {
  // Check if entire puzzle is correct
  for (let r = 0; r < puzzle.height; r++) {
    for (let c = 0; c < puzzle.width; c++) {
      if (!isBlack(r, c)) {
        const val = state[r][c];
        const sol = puzzle.solution[key(r, c)];
        if (val !== sol) return false; // puzzle not complete
      }
    }
  }

  // Puzzle fully correct → highlight row 5 (6th row)
  for (let c = 0; c < puzzle.width; c++) {
    const cell = grid.children[5 * puzzle.width + c];
    if (!isBlack(5, c)) cell.style.background = "#ffd6ec";
  }

  // Add question mark at last cell of row 5
  const lastCell = grid.children[5 * puzzle.width + (puzzle.width - 1)];
  if (!lastCell.querySelector(".question")) {
    const qm = document.createElement("div");
    qm.textContent = "?";
    qm.className = "question";
    qm.style.position = "absolute";
    qm.style.right = "4px";
    qm.style.bottom = "2px";
    qm.style.fontSize = "20px";
    qm.style.fontWeight = "bold";
    qm.style.color = "#5a0033";
    lastCell.appendChild(qm);
  // Delay before showing YES/NO overlay (e.g., 1 second = 1000ms)
  setTimeout(() => {
    showYesNoStage();
  }, 3000); 
}
  return true;
}
</script>
</body>
</html>
